  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Huruf Korea</title>

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:15px;
}

.card{
  background:white;
  width:100%;
  max-width:500px;
  margin:auto;
  padding:25px 20px;
  text-align:center;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#question{
  font-size:42px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:10px;
  border:2px solid orange;
  border-radius:6px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:15px;
  cursor:pointer;
  background:#007BFF;
  color:white;
  border:none;
  border-radius:6px;
}

.result{
  font-size:20px;
  font-weight:bold;
}

.correct{
  color:green;
}

.wrong{
  color:red;
}

/* Perbaikan agar nomor tidak terpotong */

ol{
  text-align:left;
  max-height:65vh;
  overflow-y:auto;
  padding-left:30px;
  margin:0;
}

li{
  margin-bottom:8px;
  line-height:1.4;
}

</style>
</head>

<body>

<div class="card">

<h2 id="question"></h2>

<input type="text" id="answerInput" placeholder="Tulis jawaban di sini">

<button id="nextBtn">Selanjutnya</button>

</div>

<script>

let questions = [

{ soal:"아", jawaban:"a" },
{ soal:"야", jawaban:"ya" },
{ soal:"어", jawaban:"eo" },
{ soal:"여", jawaban:"yeo" },
{ soal:"오", jawaban:"o" },
{ soal:"요", jawaban:"yo" },
{ soal:"우", jawaban:"u" },
{ soal:"유", jawaban:"yu" },
{ soal:"으", jawaban:"eu" },
{ soal:"이", jawaban:"i" },

{ soal:"애", jawaban:"ae" },
{ soal:"얘", jawaban:"yae" },
{ soal:"에", jawaban:"e" },
{ soal:"예", jawaban:"ye" },
{ soal:"와", jawaban:"wa" },
{ soal:"왜", jawaban:"wae" },
{ soal:"외", jawaban:"wei" },
{ soal:"워", jawaban:"weo" },
{ soal:"웨", jawaban:"we" },
{ soal:"위", jawaban:"wi" },
{ soal:"의", jawaban:"eui" },

{ soal:"ㄱ", jawaban:"g" },
{ soal:"ㄴ", jawaban:"n" },
{ soal:"ㄷ", jawaban:"d" },
{ soal:"ㄹ", jawaban:"r" },
{ soal:"ㅁ", jawaban:"m" },
{ soal:"ㅂ", jawaban:"b" },
{ soal:"ㅅ", jawaban:"s" },
{ soal:"ㅇ", jawaban:"ng" },
{ soal:"ㅈ", jawaban:"j" },
{ soal:"ㅊ", jawaban:"ch" },
{ soal:"ㅋ", jawaban:"kh" },
{ soal:"ㅌ", jawaban:"th" },
{ soal:"ㅍ", jawaban:"ph" },
{ soal:"ㅎ", jawaban:"h" },
{ soal:"ㄲ", jawaban:"k" },
{ soal:"ㄸ", jawaban:"t" },
{ soal:"ㅃ", jawaban:"p" },
{ soal:"ㅆ", jawaban:"ss" },
{ soal:"ㅉ", jawaban:"c" }

];

questions = questions.sort(()=>Math.random()-0.5);

let index = 0;
let score = 0;
let userAnswers = [];

const questionEl = document.getElementById("question");
const answerInput = document.getElementById("answerInput");
const nextBtn = document.getElementById("nextBtn");
const card = document.querySelector(".card");

function showQuestion(){
  questionEl.textContent = questions[index].soal;
  answerInput.value="";
  answerInput.focus();
}

nextBtn.addEventListener("click",()=>{

  const userAnswer = answerInput.value.trim().toLowerCase();

  userAnswers[index] = userAnswer;

  if(userAnswer === questions[index].jawaban){
    score++;
  }

  index++;

  if(index < questions.length){
    showQuestion();
  }else{
    showResult();
  }

});

function showResult(){

  let answerList="";

  questions.forEach((q,i)=>{

    if(userAnswers[i] === q.jawaban){
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span></li>`;
    }else{
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span><br>
      Jawaban kamu: <span class="wrong">${userAnswers[i] || "(kosong)"}</span></li>`;
    }

  });

  card.innerHTML = `
  <h2>Hasil</h2>
  <p class="result">Nilai: ${score} / ${questions.length}</p>
  <hr>
  <p>Kunci Jawaban:</p>
  <ol>${answerList}</ol>
  `;

}

showQuestion();

</script>

</body>
</html>
    
  </body>
  
</html>
